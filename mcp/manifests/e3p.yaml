atom: e3p
envelope: true
timeout_ms: 60000
tools:
  # e3p_login intentionally omitted (lead decision): its --password flows as a
  # plain CLI arg, and M2's observe.py will log structured MCP tool_input for
  # every mcp__utils__* call — that would land a plaintext Moodle password in
  # the observation log with no redaction path yet. login is a low-frequency,
  # one-time-per-session operation; keeping it CLI-only until redaction exists
  # is a scope decision, not a manifest gap. Use `utils e3p login` directly.

  - name: e3p_logout
    description: "Forget the stored E3 token/config file (~/.config/utils/e3p.json). Use when clearing stale or wrong credentials before re-login."
    argv_prefix: ["logout"]
    params: []

  - name: e3p_whoami
    description: "Show the currently authenticated E3 user and site info. Use to confirm which account/token is active."
    argv_prefix: ["whoami"]
    params: []

  - name: e3p_courses
    description: "List the authenticated user's enrolled E3 courses, sorted by start date (newest first). Use when you need a course ID to pass to other e3p atoms, or to summarize what the user is enrolled in."
    argv_prefix: ["courses"]
    params:
      - name: show_hidden
        type: boolean
        required: false
        cli: "--hidden"
        description: "Include hidden/archived courses (excluded by default)."

  - name: e3p_assignments
    description: "List assignments for one course or every enrolled course, with due dates and intro text. Use when checking upcoming or past coursework."
    argv_prefix: ["assignments"]
    params:
      - name: courseid
        type: number
        required: false
        positional: true
        description: "Course ID. Omit to list assignments across all enrolled courses."
      - name: status
        type: boolean
        required: false
        cli: "--status"
        description: "Also fetch the user's submission status per assignment (N+1 extra API calls — slower). Default: false."

  - name: e3p_due
    description: "List upcoming action events (deadlines, quizzes, unsubmitted items) from the E3 calendar within a look-ahead window. Use when answering 'what's due soon'."
    argv_prefix: ["due"]
    params:
      - name: days
        type: number
        required: false
        cli: "--days"
        description: "Look-ahead window in days. Default: 14."
      - name: limit
        type: number
        required: false
        cli: "--limit"
        description: "Max events to return. Default: 50."

  - name: e3p_submission
    description: "Get detailed submission status (files, text, grade, editability) for one assignment by ID, for the authenticated user. Use after e3p_assignments to inspect a specific assignment's submission state."
    argv_prefix: ["submission"]
    params:
      - name: assignid
        type: number
        required: true
        positional: true
        description: "Assignment ID, from e3p_assignments output."

  - name: e3p_grades
    description: "List the authenticated user's gradebook items for one course or every enrolled course. Use when checking scores/feedback."
    argv_prefix: ["grades"]
    params:
      - name: courseid
        type: number
        required: false
        positional: true
        description: "Course ID. Omit to list grades across all enrolled courses."

  - name: e3p_content
    description: "Get a course's outline — sections and the activities (assignments, quizzes, pages, resources) inside each. Use when exploring what's in a course beyond just assignments."
    argv_prefix: ["content"]
    params:
      - name: courseid
        type: number
        required: true
        positional: true
        description: "Course ID."

  - name: e3p_download
    description: "Download a Moodle pluginfile.php URL, auto-injecting the stored auth token. Use to fetch an assignment attachment or course resource file found in another e3p atom's output."
    argv_prefix: ["download"]
    params:
      - name: url
        type: string
        required: true
        positional: true
        description: "A .../webservice/pluginfile.php/... URL."
      - name: out
        type: string
        required: false
        cli: "--out"
        description: "Output path. Default: the URL's basename."

  - name: e3p_call
    description: "Escape hatch: call any Moodle Web Services function directly by name, with optional key=value params (repeat key[]=v for array values). Use only when no other e3p atom covers what you need."
    argv_prefix: ["call"]
    params:
      - name: function
        type: string
        required: true
        positional: true
        description: "Moodle WS function name, e.g. core_webservice_get_site_info."
      - name: params
        type: array
        required: false
        positional: true
        description: "Extra key=value pairs, e.g. courseid=123. Repeat a key with [] to build an array value, e.g. field[]=a field[]=b. Positional — appended after function, in the order given."
