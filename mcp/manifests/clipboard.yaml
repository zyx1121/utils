atom: clipboard
envelope: false
tools:
  - name: clipboard_read
    description: "Read the current macOS clipboard contents as text."
    argv_prefix: ["read"]
  - name: clipboard_clear
    description: "Empty the macOS clipboard."
    argv_prefix: ["clear"]
# clipboard_write intentionally omitted: scripts/clipboard.sh's `write`
# subcommand reads its content exclusively from stdin (`pbcopy` with no CLI
# arg), but the frozen manifest spec only maps params onto argv (positional
# or --flag) and the executor fixes subprocess stdio to
# ["ignore", "pipe", "pipe"]. There is no manifest-expressible way to route a
# tool param's value onto stdin, so `write` can't be wired up without either
# extending the manifest spec (out of scope here) or changing the atom to
# accept a CLI argument. See worker report for the flagged decision.
