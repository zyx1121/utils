atom: pve
envelope: true
timeout_ms: 120000  # multi-step SSH round-trips (clone/create-ct/destroy cascade) can run past 60s
tools:
  - name: pve_list
    description: "List all VMs and LXC containers on the PVE host with VMID, name, type, status, and memory. Use when checking what's currently running or finding a VMID/name before another pve operation."
    argv_prefix: ["list"]
    params: []

  - name: pve_status
    description: "Show config and status (cores, memory, IP, hostname, etc.) for one VM or container. Use when inspecting a specific guest's current configuration before acting on it."
    argv_prefix: ["status"]
    params:
      - name: name
        type: string
        required: true
        positional: true
        description: "VM/CT name or VMID."

  - name: pve_start
    description: "Start a stopped VM or LXC container. Use when bringing a guest online."
    argv_prefix: ["start"]
    params:
      - name: name
        type: string
        required: true
        positional: true
        description: "VM/CT name or VMID."

  - name: pve_stop
    description: "Force-stop (power off) a running VM or container immediately — equivalent to pulling the plug, not a graceful shutdown; unsaved guest state can be lost. Confirm-gated: calls typer.confirm() when yes isn't passed, which aborts immediately (non-zero exit, verified fast — no hang) under the MCP executor's no-TTY stdin, so the operation fails closed rather than proceeding unconfirmed. Pass yes=true to actually run it. Use when a guest needs to go offline right away."
    argv_prefix: ["stop"]
    params:
      - name: name
        type: string
        required: true
        positional: true
        description: "VM/CT name or VMID."
      - name: yes
        type: boolean
        required: false
        cli: "--yes"
        description: "Skip the interactive confirmation prompt. Required (true) when calling over MCP since there is no TTY to confirm — otherwise the command fails closed."

  - name: pve_destroy
    description: "Permanently destroy a VM or container — irreversible: purges disks + config, and cascades cleanup of its port forwards, DNS record, Caddy reverse-proxy block, PVE firewall file, and SSH alias. Confirm-gated: calls typer.confirm() when yes isn't passed, which aborts immediately (non-zero exit, verified fast — no hang) under the MCP executor's no-TTY stdin, so the operation fails closed rather than proceeding unconfirmed. Pass yes=true over MCP. Use only when a guest is being permanently decommissioned."
    argv_prefix: ["destroy"]
    params:
      - name: name
        type: string
        required: true
        positional: true
        description: "VM/CT name or VMID."
      - name: yes
        type: boolean
        required: false
        cli: "--yes"
        description: "Skip the interactive confirmation prompt. Required (true) when calling over MCP since there is no TTY to confirm — otherwise the command fails closed."

  - name: pve_clone
    description: "Clone a new QEMU VM from a template, assign it an IP, wire up a 50<vmid>:22 external SSH forward, and apply east-west firewall isolation. Confirm-gated: calls typer.confirm() when yes isn't passed, which aborts immediately (non-zero exit, verified fast — no hang) under the MCP executor's no-TTY stdin. Pass yes=true over MCP. Use when provisioning a new VM."
    argv_prefix: ["clone"]
    params:
      - name: name
        type: string
        required: true
        positional: true
        description: "New VM name."
      - name: ip
        type: string
        required: false
        cli: "--ip"
        description: "Internal IP. Default: <subnet>.<VMID> derived from the gateway IP."
      - name: template
        type: number
        required: false
        cli: "--template"
        description: "Source template VMID. Default: env UTILS_PVE_TEMPLATE (9000)."
      - name: vmid
        type: number
        required: false
        cli: "--vmid"
        description: "Target VMID. Default: next free VMID >= 100."
      - name: cores
        type: number
        required: false
        cli: "--cores"
        description: "Override template CPU core count."
      - name: ram
        type: number
        required: false
        cli: "--ram"
        description: "Override template RAM in MB."
      - name: disk
        type: number
        required: false
        cli: "--disk"
        description: "Resize scsi0 to N GB (must be >= template size)."
      - name: no_forward
        type: boolean
        required: false
        cli: "--no-forward"
        description: "Skip the auto-added 50<vmid>:22 external SSH forward."
      - name: no_isolate
        type: boolean
        required: false
        cli: "--no-isolate"
        description: "Skip east-west firewall isolation (the 'spoke' firewall group)."
      - name: yes
        type: boolean
        required: false
        cli: "--yes"
        description: "Skip the interactive confirmation prompt. Required (true) when calling over MCP since there is no TTY to confirm — otherwise the command fails closed."

  - name: pve_create_ct
    description: "Create a new LXC container from a vztmpl template — the pct-native mirror of pve_clone, wiring the same 50<vmid>:22 SSH forward + spoke firewall isolation. Confirm-gated: calls typer.confirm() when yes isn't passed, which aborts immediately (non-zero exit, verified fast — no hang) under the MCP executor's no-TTY stdin. Pass yes=true over MCP. Use when provisioning a new lightweight container instead of a full VM."
    argv_prefix: ["create-ct"]
    params:
      - name: name
        type: string
        required: true
        positional: true
        description: "Hostname for the new container."
      - name: template
        type: string
        required: false
        cli: "--template"
        description: "vztmpl volid. Default: env UTILS_PVE_CT_TEMPLATE or ubuntu-24.04-standard."
      - name: vmid
        type: number
        required: false
        cli: "--vmid"
        description: "Target VMID. Default: next free VMID >= 200."
      - name: ip
        type: string
        required: false
        cli: "--ip"
        description: "Internal IP. Default: <subnet>.<VMID>."
      - name: cores
        type: number
        required: false
        cli: "--cores"
        description: "CPU core count. Default: 2."
      - name: ram
        type: number
        required: false
        cli: "--ram"
        description: "RAM in MB. Default: 2048."
      - name: disk
        type: number
        required: false
        cli: "--disk"
        description: "Root filesystem size in GB. Default: 8."
      - name: swap
        type: number
        required: false
        cli: "--swap"
        description: "Swap in MB. Default: 4096."
      - name: storage
        type: string
        required: false
        cli: "--storage"
        description: "Storage pool for rootfs. Default: local-lvm."
      - name: unprivileged
        type: boolean
        required: false
        cli: "--unprivileged"
        cli_false: "--privileged"
        description: "Run as unprivileged container (true, default) or privileged (false — appends --privileged; the underlying flag pair defaults true, so this must be explicit rather than a bare omitted flag)."
      - name: nesting
        type: boolean
        required: false
        cli: "--nesting"
        description: "Enable container nesting feature. Default: false."
      - name: no_forward
        type: boolean
        required: false
        cli: "--no-forward"
        description: "Skip the auto-added 50<vmid>:22 external SSH forward."
      - name: no_isolate
        type: boolean
        required: false
        cli: "--no-isolate"
        description: "Skip east-west firewall isolation (the 'spoke' firewall group)."
      - name: yes
        type: boolean
        required: false
        cli: "--yes"
        description: "Skip the interactive confirmation prompt. Required (true) when calling over MCP since there is no TTY to confirm — otherwise the command fails closed."

  - name: pve_forward
    description: "Manage PVE iptables PREROUTING port forwards — add / list / del — that map an external host port to a VM's internal IP:port. Use when exposing an internal guest service, or auditing/removing an existing forward."
    argv_prefix: ["forward"]
    params:
      - name: spec
        type: string
        required: false
        positional: true
        description: "HOST_PORT:VM_IP:VM_PORT. Required for action=add; unused for list/del."
      - name: action
        type: enum
        enum: ["add", "list", "del"]
        required: false
        cli: "--action"
        description: "Which operation to perform. Default: add."
      - name: line
        type: number
        required: false
        cli: "--line"
        description: "iptables rule line number, required for action=del (get it from action=list)."

  - name: pve_dns
    description: "Manage *.internal DNS records in the gateway's dnsmasq hosts file — add / remove / list. remove permanently deletes the mapping (re-addable, but not reversible in place). Confirm-gated for remove: calls typer.confirm() when yes isn't passed, which aborts immediately (non-zero exit, verified fast — no hang) under the MCP executor's no-TTY stdin. Use when giving a VM a friendly internal hostname or cleaning one up."
    argv_prefix: ["dns"]
    params:
      - name: host
        type: string
        required: false
        positional: true
        description: "Hostname. Required for action=add/remove. Positional and order-dependent — cannot be omitted while ip is given."
      - name: ip
        type: string
        required: false
        positional: true
        description: "IP address. Required for action=add only."
      - name: action
        type: enum
        enum: ["add", "remove", "list"]
        required: false
        cli: "--action"
        description: "Which operation to perform. Default: add."
      - name: dry_run
        type: boolean
        required: false
        cli: "--dry-run"
        description: "Show the planned change without applying it (action=add only)."
      - name: yes
        type: boolean
        required: false
        cli: "--yes"
        description: "Skip the interactive confirmation prompt (action=remove). Required (true) over MCP since there is no TTY to confirm — otherwise the command fails closed."

  - name: pve_caddy
    description: "Manage Caddy reverse-proxy site blocks on the gateway — add / remove / list — with automatic caddy fmt + caddy validate + atomic swap + reload-or-rollback. remove takes a live route down; a shrinking add (replacing a multi-host block and dropping some of its hostnames) is equally destructive to those dropped hosts. Confirm-gated for both: calls typer.confirm() when yes isn't passed, which aborts immediately (non-zero exit, verified fast — no hang) under the MCP executor's no-TTY stdin. Use when exposing an internal service under a public domain, or removing/auditing an existing Caddy block."
    argv_prefix: ["caddy"]
    params:
      - name: domain
        type: string
        required: false
        positional: true
        description: "Public domain head. Comma-join for one multi-host block, e.g. 'a.tw,*.a.tw'. Required for add/remove. Positional and order-dependent relative to upstream."
      - name: upstream
        type: string
        required: false
        positional: true
        description: "Upstream host:port for the simple form (renders a single reverse_proxy directive). Mutually exclusive with body."
      - name: action
        type: enum
        enum: ["add", "remove", "list"]
        required: false
        cli: "--action"
        description: "Which operation to perform. Default: add."
      - name: tls
        type: string
        required: false
        cli: "--tls"
        description: "TLS for the simple form: two space-separated paths 'CERT KEY', or the literal 'internal'. Not valid together with body."
      - name: body
        type: string
        required: false
        cli: "--body"
        description: "Escape hatch: verbatim block body (matchers / handle / headers / anything). Excludes upstream + tls. The CLI's '-' (read from stdin) form is not usable over MCP — pass the body text directly."
      - name: on_exists
        type: enum
        enum: ["update", "skip", "fail"]
        required: false
        cli: "--on-exists"
        description: "Behavior when the domain block already exists. Default: update (replace)."
      - name: dry_run
        type: boolean
        required: false
        cli: "--dry-run"
        description: "Render + validate on a scratch copy and return the diff; writes nothing."
      - name: yes
        type: boolean
        required: false
        cli: "--yes"
        description: "Skip confirmation for remove, or for an add that would replace/shrink an existing multi-host block. Required (true) over MCP since there is no TTY to confirm — otherwise the command fails closed."

# pve_ssh intentionally excluded: scripts/pve.py's `ssh` subcommand runs
# `subprocess.run(["ssh", name, *command])` with fully inherited stdio (no
# capture_output) — exactly the stdio-hijack pattern ADR-0001 item 3 forbids
# (subprocesses must never touch the server's real stdin/stdout, the JSON-RPC
# channel). Wrapping it would either hang on an interactive shell or corrupt
# the protocol stream. Not a manifest gap — genuinely unsuited to MCP as this
# server is built.
