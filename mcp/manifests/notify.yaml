atom: notify
envelope: false
timeout_ms: 60000
tools:
  - name: notify
    description: "Show a macOS banner notification via osascript. Use to tell the user a long-running task finished while they're elsewhere on screen or in another Space."
    argv_prefix: []
    params:
      - name: message
        type: string
        required: true
        positional: true
        description: "Notification body text."
      - name: title
        type: string
        required: false
        cli: "--title"
        description: "Title line shown below the app name in the banner. Default: 'Claude Code'."
      - name: subtitle
        type: string
        required: false
        cli: "--subtitle"
        description: "Smaller line under the title."
      - name: sound
        type: string
        required: false
        cli: "--sound"
        description: "macOS system sound name: Glass, Funk, Bottle, Frog, Ping, Pop, Purr, Sosumi, Submarine, Tink. Default: silent."
