atom: ubereats
envelope: false
timeout_ms: 300000  # cursor-paginated order enumeration + per-order receipt fetch (0.3-0.35s sleep each) over a large history can run minutes
tools:
  - name: ubereats
    description: "Fetch Uber Eats past-order receipts and/or maintain a group-order debt ledger (who ordered what, who owes you). Auth via macOS Safari cookies by default, or cookie_file on non-macOS. Three modes selected by flags: default fetches receipts to out; list_only just lists orders; ledger updates a debts.csv/names.csv ledger under csv_dir. Use when the user asks about past Uber Eats orders or group-order money owed."
    argv_prefix: []
    params:
      - name: recent
        type: number
        required: false
        cli: "--recent"
        description: "Only fetch the N most recent orders."
      - name: since
        type: string
        required: false
        cli: "--since"
        description: "Only include orders on/after this date, format YYYY-MM-DD."
      - name: until
        type: string
        required: false
        cli: "--until"
        description: "Only include orders on/before this date, format YYYY-MM-DD."
      - name: list_only
        type: boolean
        required: false
        cli: "--list-only"
        description: "Just list matching orders (uuid + item count); do not fetch per-order receipt detail."
      - name: out
        type: string
        required: false
        cli: "--out"
        description: "Receipt output directory. Default: ./ue_receipts_out."
      - name: no_cache
        type: boolean
        required: false
        cli: "--no-cache"
        description: "Ignore any cached receipt JSON and force a re-fetch."
      - name: locale
        type: string
        required: false
        cli: "--locale"
        description: "Uber Eats locale code. Default: tw-en."
      - name: cookie_file
        type: string
        required: false
        cli: "--cookie-file"
        description: "Path to a file containing a raw Cookie header line. Required on non-macOS machines (no Safari binarycookies to parse there)."
      - name: dump_cookie
        type: string
        required: false
        cli: "--dump-cookie"
        description: "macOS only. Instead of fetching orders, export the current Safari ubereats.com Cookie header to this path (chmod 600) and exit — for transferring auth to a non-macOS run via cookie_file. Writes a live session credential to disk; treat the output file as sensitive, see NOTES.md."
      - name: ledger
        type: boolean
        required: false
        cli: "--ledger"
        description: "Ledger mode: update the group-order debt CSVs under csv_dir instead of dumping receipts."
      - name: csv_dir
        type: string
        required: false
        cli: "--csv-dir"
        description: "Ledger CSV directory (debts.csv + names.csv). Default: ue_ledger. Used only with ledger=true."
      - name: me
        type: string
        required: false
        cli: "--me"
        description: "Your Uber Eats display name, for self-recognition in ledger mode (usually auto-detected via the '(You)' marker)."
