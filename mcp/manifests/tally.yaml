atom: tally
envelope: true
timeout_ms: 60000
tools:
  - name: tally
    description: "Aggregate `utils <atom>` invocation counts from the observe hook's log — total calls, active days, and a one-off/burst/habitual classification per atom. Use when reviewing which utils atoms actually get used."
    argv_prefix: []
    params:
      - name: since
        type: string
        required: false
        cli: "--since"
        description: "Only count records on/after this date, YYYY-MM-DD."
      - name: until
        type: string
        required: false
        cli: "--until"
        description: "Only count records on/before this date, YYYY-MM-DD."
      - name: top
        type: number
        required: false
        cli: "--top"
        description: "Only show the top N atoms by call count."
      - name: show_all
        type: boolean
        required: false
        cli: "--all"
        description: "List every unrecognized name in full instead of just the top 5 (regex false positives / ad-hoc strings)."
