atom: mac-app
envelope: false
timeout_ms: 90000  # scaffolds + generates icon + git init/add/commit sequentially
tools:
  - name: mac_app_new
    description: "Scaffold a new macOS menubar app from the macos-cli-dev house template (SwiftPM target, icon generation, optional git init). Use when starting a brand-new small macOS menubar utility app."
    argv_prefix: ["new"]
    params:
      - name: name
        type: string
        required: true
        positional: true
        description: "App name — also the SwiftPM target/display name (letters+digits, must start with a letter), e.g. Cappuccino."
      - name: bundle_id
        type: string
        required: false
        cli: "--bundle-id"
        description: "Bundle identifier. Default: tw.zyx.<lowercased name>."
      - name: symbol
        type: string
        required: false
        cli: "--symbol"
        description: "Menu bar SF Symbol fallback name. Default: sparkle."
      - name: category
        type: string
        required: false
        cli: "--category"
        description: "LSApplicationCategoryType. Default: public.app-category.utilities."
      - name: tagline
        type: string
        required: false
        cli: "--tagline"
        description: "One-line README tagline. Default: '<name> — a tiny macOS menubar app.'"
      - name: into
        type: string
        required: false
        cli: "--dir"
        description: "Parent directory to scaffold into. Default: current working directory at invocation time."
      - name: no_icon
        type: boolean
        required: false
        cli: "--no-icon"
        description: "Skip icon generation."
      - name: no_git
        type: boolean
        required: false
        cli: "--no-git"
        description: "Skip git init + first commit."
