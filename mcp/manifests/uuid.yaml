atom: uuid
envelope: true
tools:
  - name: uuid
    description: "Generate one or more UUIDs. v4 is random; v7 is timestamp-ordered (good for DB keys). Use for generating unique identifiers."
    argv_prefix: []
    params:
      - name: count
        type: number
        required: false
        description: "How many UUIDs to generate (default 1)"
        cli: "--count"
      - name: version
        type: enum
        enum: ["4", "7"]
        required: false
        description: "UUID version — 4 (random, default) or 7 (timestamp-ordered)"
        cli: "--version"
