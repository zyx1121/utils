atom: safari
envelope: true
timeout_ms: 60000
tools:
  - name: safari_url
    description: "Get the URL of Safari's front tab. Use when you need to know what page the user currently has open."
    argv_prefix: ["url"]
    params: []

  - name: safari_title
    description: "Get the title of Safari's front tab. Use when you need the page name without opening/reading the whole page."
    argv_prefix: ["title"]
    params: []

  - name: safari_text
    description: "Get the visible rendered text of Safari's front tab (no JavaScript required). Use when you need the page content without a screenshot or JS evaluation."
    argv_prefix: ["text"]
    params: []

  - name: safari_tabs
    description: "List every open tab across all Safari windows with window/tab index, title, and URL. Use when the user references 'my tabs' or you need to find/target a specific tab."
    argv_prefix: ["tabs"]
    params: []

  - name: safari_open
    description: "Open a URL in a new Safari tab. Does not block on page load — pair with a short delay if you need the content immediately after. Use when navigating Safari to a new page on the user's behalf."
    argv_prefix: ["open"]
    params:
      - name: target
        type: string
        required: true
        positional: true
        description: "URL to open."

  - name: safari_close
    description: "Close Safari's front tab; reports the URL that was closed. Use when cleaning up a tab you or the user is done with."
    argv_prefix: ["close"]
    params: []

  - name: safari_selection
    description: "Get the user's current text selection in Safari's front tab. Requires Safari's 'Allow JavaScript from Apple Events' setting. Use when the user says 'this' referring to highlighted page text."
    argv_prefix: ["selection"]
    params: []

  - name: safari_js
    description: "Evaluate a JavaScript expression in Safari's front tab and return the result as a string. Requires Safari's 'Allow JavaScript from Apple Events' setting. Use for page inspection/interaction beyond what the other safari atoms cover."
    argv_prefix: ["js"]
    params:
      - name: expression
        type: string
        required: true
        positional: true
        description: "JavaScript expression to evaluate."
