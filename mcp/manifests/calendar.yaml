atom: calendar
envelope: true
timeout_ms: 70000  # run_as() sets an explicit 60s subprocess timeout — MCP ceiling must exceed it
tools:
  - name: calendar_show_cals
    description: "List all Calendar.app calendars with their writability. Use to discover valid cal values before add/list/search/delete."
    argv_prefix: ["show-cals"]
    params: []

  - name: calendar_list
    description: "List events across one or all calendars within a date range (default: today through +7 days). Use when checking what's on the user's schedule."
    argv_prefix: ["list"]
    params:
      - name: cal
        type: string
        required: false
        cli: "--cal"
        description: "Filter to a single calendar. Default: all calendars."
      - name: from
        type: string
        required: false
        cli: "--from"
        description: "Range start: YYYY-MM-DD, YYYY-MM-DDTHH:MM, 'today', 'tomorrow', 'now', or 'next week'. Default: today 00:00."
      - name: to
        type: string
        required: false
        cli: "--to"
        description: "Range end, same formats as from. Default: from + 7 days."
      - name: limit
        type: number
        required: false
        cli: "--limit"
        description: "Cap the number of events returned."

  - name: calendar_add
    description: "Add a new Calendar.app event with a start time and duration. Use when the user asks to schedule something."
    argv_prefix: ["add"]
    params:
      - name: summary
        type: string
        required: true
        positional: true
        description: "Event title."
      - name: at
        type: string
        required: true
        cli: "--at"
        description: "Start time: YYYY-MM-DDTHH:MM, 'tomorrow', etc."
      - name: duration
        type: number
        required: false
        cli: "--duration"
        description: "Duration in minutes. Default: 60."
      - name: cal
        type: string
        required: false
        cli: "--cal"
        description: "Target calendar name. Default: first writable calendar."
      - name: location
        type: string
        required: false
        cli: "--location"
        description: "Event location."
      - name: notes
        type: string
        required: false
        cli: "--notes"
        description: "Event description/notes."

  - name: calendar_search
    description: "Search event summaries (case-insensitive substring) within a date range, default today through +30 days. Use to find an event without knowing its exact date."
    argv_prefix: ["search"]
    params:
      - name: query
        type: string
        required: true
        positional: true
        description: "Substring to match against event summaries."
      - name: cal
        type: string
        required: false
        cli: "--cal"
        description: "Filter to one calendar. Default: all calendars."
      - name: from
        type: string
        required: false
        cli: "--from"
        description: "Range start. Default: today."
      - name: to
        type: string
        required: false
        cli: "--to"
        description: "Range end. Default: today + 30 days."
      - name: limit
        type: number
        required: false
        cli: "--limit"
        description: "Cap the number of events returned."

  - name: calendar_delete
    description: "Delete the first event with an exact-matching summary within a date range. Requires cal to be given explicitly — there is no fuzzy/cross-calendar delete. Use when removing a specific scheduled event."
    argv_prefix: ["delete"]
    params:
      - name: summary
        type: string
        required: true
        positional: true
        description: "Event summary — exact match."
      - name: cal
        type: string
        required: true
        cli: "--cal"
        description: "Calendar to search. Required — no cross-calendar fuzzy delete."
      - name: from
        type: string
        required: false
        cli: "--from"
        description: "Range start. Default: today."
      - name: to
        type: string
        required: false
        cli: "--to"
        description: "Range end. Default: today + 30 days."
