atom: pdf
envelope: true
timeout_ms: 60000
tools:
  - name: pdf_info
    description: "Get page count, encryption status, PDF version, metadata, and file size for a PDF. Use before other pdf atoms to check basics, or to detect if a file needs pdf_decrypt first."
    argv_prefix: ["info"]
    params:
      - name: file
        type: string
        required: true
        positional: true
        description: "PDF path."

  - name: pdf_text
    description: "Extract plain text from a PDF, optionally limited to a page range, to stdout or a .txt file. Use when you need a PDF's textual content for reading or search."
    argv_prefix: ["text"]
    params:
      - name: file
        type: string
        required: true
        positional: true
        description: "PDF path."
      - name: pages
        type: string
        required: false
        cli: "--pages"
        description: "Page range, e.g. '1-3,5'. Default: all pages."
      - name: out
        type: string
        required: false
        cli: "--out"
        description: "Write extracted text to this file instead of returning it inline."

  - name: pdf_comments
    description: "Extract annotations, highlights, and comments from a PDF, with the highlighted/underlined text they cover (approximate — the annotation's own content field is authoritative). Use when processing a reviewer's markup on a PDF."
    argv_prefix: ["comments"]
    params:
      - name: file
        type: string
        required: true
        positional: true
        description: "PDF path."
      - name: pages
        type: string
        required: false
        cli: "--pages"
        description: "Page range, e.g. '1-3'. Default: all pages."
      - name: fields
        type: string
        required: false
        cli: "--fields"
        description: "Comma-separated subset of keys to keep: page,type,author,content,marked_text — shrinks output."
      - name: out
        type: string
        required: false
        cli: "--out"
        description: "Write full JSON to this file and return only a summary, instead of returning the full list inline."

  - name: pdf_compress
    description: "Shrink a PDF's file size via Ghostscript recompression. Use when a PDF is too large to attach/upload/store as-is."
    argv_prefix: ["compress"]
    params:
      - name: file
        type: string
        required: true
        positional: true
        description: "PDF path."
      - name: level
        type: enum
        enum: ["screen", "ebook", "printer", "prepress"]
        required: false
        cli: "--level"
        description: "Compression preset: screen=smallest/72dpi ... prepress=largest/300dpi+color. Default: ebook."
      - name: out
        type: string
        required: false
        cli: "--out"
        description: "Output path. Default: <name>.compressed.pdf next to the source."

  - name: pdf_decrypt
    description: "Remove password protection/encryption from a PDF given its open password. Use when a downstream tool (e.g. pdf_text) can't read an encrypted PDF."
    argv_prefix: ["decrypt"]
    params:
      - name: file
        type: string
        required: true
        positional: true
        description: "PDF path."
      - name: password
        type: string
        required: false
        cli: "--password"
        description: "Open password, if the PDF requires one to open at all."
      - name: out
        type: string
        required: false
        cli: "--out"
        description: "Output path. Default: <name>.decrypted.pdf next to the source."

  - name: pdf_merge
    description: "Concatenate 2+ PDFs into one, in argument order. Use when combining multiple PDF files into a single document."
    argv_prefix: ["merge"]
    params:
      - name: inputs
        type: array
        required: true
        positional: true
        description: "Input PDF paths, in merge order. Requires 2+ paths — the underlying command hard-fails below that."
      - name: out
        type: string
        required: true
        cli: "--out"
        description: "Output path."

  - name: pdf_split
    description: "Extract a page range out of a PDF into a new file. Use when you need just part of a larger PDF."
    argv_prefix: ["split"]
    params:
      - name: file
        type: string
        required: true
        positional: true
        description: "PDF path."
      - name: pages
        type: string
        required: true
        cli: "--pages"
        description: "Pages to keep, e.g. '1-3,5' (1-based)."
      - name: out
        type: string
        required: false
        cli: "--out"
        description: "Output path. Default: <name>.pages-<spec>.pdf next to the source."

  - name: pdf_rotate
    description: "Rotate PDF pages by a multiple of 90 degrees, optionally limited to a page range. Use when a scanned PDF has pages in the wrong orientation."
    argv_prefix: ["rotate"]
    params:
      - name: file
        type: string
        required: true
        positional: true
        description: "PDF path."
      - name: deg
        type: number
        required: true
        cli: "--deg"
        description: "Degrees clockwise: 90, 180, or 270 (negatives allowed). Must be a multiple of 90."
      - name: pages
        type: string
        required: false
        cli: "--pages"
        description: "Pages to rotate, e.g. '1-3'. Default: all pages."
      - name: out
        type: string
        required: false
        cli: "--out"
        description: "Output path. Default: <name>.rotated.pdf next to the source."

  - name: pdf_render
    description: "Render PDF pages to PNG images — useful for feeding a vision model, which can see layout/tables/figures that plain text extraction loses. Use when text extraction alone won't capture what's on the page."
    argv_prefix: ["render"]
    params:
      - name: file
        type: string
        required: true
        positional: true
        description: "PDF path."
      - name: pages
        type: string
        required: false
        cli: "--pages"
        description: "Pages to render, e.g. '1-3'. Default: all pages."
      - name: dpi
        type: number
        required: false
        cli: "--dpi"
        description: "Render resolution. Default: 150; use 300 for fine detail."
      - name: out
        type: string
        required: false
        cli: "--out"
        description: "Output path — only honored for a single rendered page. Multi-page output always writes <name>.p<N>.png next to the source."
