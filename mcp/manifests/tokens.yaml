atom: tokens
envelope: true
timeout_ms: 60000
tools:
  - name: tokens
    description: "Count tokens in a file or an inline string using the cl100k_base tokenizer (tiktoken). Claude models have no public tokenizer, so opus/sonnet/haiku counts are approximate. Use when estimating context/prompt size before sending text to a model."
    argv_prefix: []
    params:
      - name: target
        type: string
        required: true
        positional: true
        description: "File path, or raw text if the path does not exist as a file."
      - name: model
        type: enum
        enum: ["opus", "sonnet", "haiku", "gpt-4", "gpt-3.5"]
        required: false
        cli: "--model"
        description: "Tokenizer model to approximate. Default: opus. All map to cl100k_base."
